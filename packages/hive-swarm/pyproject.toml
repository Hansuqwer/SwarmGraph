[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "hive-swarm"
version = "0.8.1"
description = "Ruflo-inspired swarm intelligence for Pydantic v2 + LangGraph (patched 2026-05-07)"
requires-python = ">=3.11,<3.14"
dependencies = [
    "pydantic>=2.7,<3",
    "swarm-shared>=0.8.1,<0.9",
]

[project.optional-dependencies]
langgraph = [
    "langgraph>=0.3,<2",
    "langgraph-checkpoint>=4.0.0,<5",
    "langgraph-checkpoint-sqlite>=3.0.1,<4",
    "langgraph-checkpoint-postgres>=3.0.0,<4",
]
dev = [
    "pytest>=9.0.3,<10",
    "pytest-asyncio>=1.3,<2",
    "pytest-cov>=7.1,<8",
    "hypothesis>=6.110",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q --tb=short --strict-markers"
asyncio_mode = "auto"
markers = [
    "hypothesis: property-based tests",
    "hitl: human-in-the-loop integration tests",
]

[tool.hatch.build.targets.wheel]
packages = ["swarm"]

[tool.hatch.metadata]
allow-direct-references = true
