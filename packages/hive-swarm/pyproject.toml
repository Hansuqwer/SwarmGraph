[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "hive-swarm"
version = "1.1.0"
description = "Ruflo-inspired swarm intelligence for Pydantic v2 + LangGraph (patched 2026-05-07)"
requires-python = ">=3.11,<3.14"
dependencies = [
    "pydantic>=2.7,<3",
    "swarm-shared>=0.1.0",
]

[project.optional-dependencies]
langgraph = [
    "langgraph>=0.3,<2",
    "langgraph-checkpoint>=2.0,<3",
    "langgraph-checkpoint-sqlite>=2.0,<3",
    "langgraph-checkpoint-postgres>=2.0,<3",
]
dev = [
    "pytest>=8.0,<9",
    "pytest-asyncio>=0.23,<1",
    "pytest-cov>=5.0,<7",
    "hypothesis>=6.110",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q --tb=short --strict-markers"
asyncio_mode = "auto"
markers = [
    "hypothesis: property-based tests",
    "hitl: human-in-the-loop integration tests",
]

[tool.hatch.build.targets.wheel]
packages = ["swarm"]

[tool.hatch.metadata]
allow-direct-references = true
