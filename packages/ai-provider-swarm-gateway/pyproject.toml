[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ai-provider-swarm-gateway"
version = "0.1.1"
description = "AI provider routing gateway with swarm consensus (patched 2026-05-07)"
requires-python = ">=3.11,<3.14"
dependencies = [
    "pydantic>=2.7,<3",
    "swarm-shared>=0.1.0",
    "typer>=0.12,<1",
    "rich>=13.7,<15",
]

[project.optional-dependencies]
yaml = ["pyyaml>=6.0,<7"]
tui = [
    "textual>=0.80,<1",
    "plotext>=5,<6",
    "psutil>=5,<8",
]
vault = ["cryptography>=42,<47"]
langgraph = [
    "langgraph>=0.3,<2",
    "langgraph-checkpoint>=4.0.0,<5",
]
dev = [
    "pytest>=9.0.3,<10",
    "pytest-asyncio>=1.3,<2",
    "pytest-cov>=5.0,<7",
]

[project.scripts]
ai-provider-gateway = "ai_provider_swarm_gateway.cli:main"

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q --tb=short --strict-markers"
asyncio_mode = "auto"

[tool.hatch.build.targets.wheel]
packages = ["src/ai_provider_swarm_gateway"]

[tool.hatch.metadata]
allow-direct-references = true
