name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Lint (ruff)
        run: uv run ruff check packages/

      - name: Type check (pyright)
        run: uv run pyright
        continue-on-error: true  # informational until types are fully annotated

      - name: Test
        run: |
          uv run pytest \
            packages/swarm-shared/tests \
            packages/hive-swarm/tests \
            packages/ai-provider-swarm-gateway/tests \
            --tb=short -q

      - name: Smoke test (stub mode)
        run: uv run python examples/01_smoke_stub_mode.py
