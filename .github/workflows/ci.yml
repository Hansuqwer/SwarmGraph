name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  docker-smoke:
    name: Docker build and smoke
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Build gateway image
        run: docker build -t swarmgraph-gateway:ci .

      - name: Smoke service endpoints
        run: |
          set -euo pipefail
          docker run -d --rm --name swarmgraph-gateway-ci -p 18000:8000 swarmgraph-gateway:ci
          trap 'docker stop swarmgraph-gateway-ci >/dev/null 2>&1 || true' EXIT
          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:18000/healthz >/dev/null; then
              break
            fi
            sleep 1
          done
          curl -fsS http://127.0.0.1:18000/healthz
          curl -fsS http://127.0.0.1:18000/readyz

  test:
    name: Test (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --locked --all-extras --dev

      - name: Lint (ruff)
        run: uv run ruff check packages/

      - name: Format check (ruff)
        run: uv run ruff format --check packages/

      - name: Type check (pyright)
        run: uv run pyright

      - name: Test
        run: |
          uv run pytest \
            packages/swarm-shared/tests \
            packages/hive-swarm/tests \
            packages/ai-provider-swarm-gateway/tests \
            --tb=short -q

      - name: Coverage report
        if: matrix.python-version == '3.11' && matrix.os == 'ubuntu-latest'
        run: |
          uv run pytest \
            packages/swarm-shared/tests \
            packages/hive-swarm/tests \
            packages/ai-provider-swarm-gateway/tests \
            --cov=packages/swarm-shared/swarm_shared \
            --cov=packages/hive-swarm/swarm \
            --cov=packages/ai-provider-swarm-gateway/src/ai_provider_swarm_gateway \
            --cov-fail-under=75 \
            --cov-report=xml:coverage.xml \
            --cov-report=term \
            --tb=short -q

      - name: Validate generated SBOM JSON
        if: matrix.python-version == '3.11' && matrix.os == 'ubuntu-latest'
        run: |
          uv run python scripts/generate_sbom.py --output sbom.cyclonedx.json
          uv run python scripts/validate_sbom.py sbom.cyclonedx.json

      - name: Upload coverage report
        if: matrix.python-version == '3.11' && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: error

      - name: Smoke test (stub mode)
        run: uv run python examples/01_smoke_stub_mode.py
