name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build packages
        run: |
          rm -rf dist
          uv build --package swarm-shared --out-dir dist
          uv build --package hive-swarm --out-dir dist
          uv build --package ai-provider-swarm-gateway --out-dir dist
          python scripts/generate_sbom.py --output dist/sbom.cyclonedx.json
          python scripts/generate_license_report.py --output dist/licenses.txt
          ls -lah dist

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  provenance:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Extract changelog section
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES="$(
            awk -v version="$VERSION" '
              $0 == "## [" version "]" || index($0, "## [" version "] ") == 1 {
                found = 1
                next
              }
              found && /^## \[/ { exit }
              found { print }
            ' CHANGELOG.md
          )"
          if [ -z "$NOTES" ]; then
            echo "::error::No CHANGELOG.md section found for release version ${VERSION}"
            exit 1
          fi
          {
            echo "notes<<EOF"
            printf '%s\n' "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.notes }}
          files: dist/*
          fail_on_unmatched_files: true
