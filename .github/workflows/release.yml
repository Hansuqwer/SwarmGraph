name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --locked --all-extras --dev

      - name: Run release gates
        run: |
          uv run ruff check packages/
          uv run ruff format --check packages/
          uv run pyright
          uv run pytest packages/swarm-shared/tests packages/hive-swarm/tests packages/ai-provider-swarm-gateway/tests --tb=short -q
          uv run python examples/01_smoke_stub_mode.py
          uv run mkdocs build --strict
          uv run pip-audit --desc --skip-editable
          uv run bandit -r packages/swarm-shared/swarm_shared packages/hive-swarm/swarm packages/ai-provider-swarm-gateway/src -f screen

  build:
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --locked --all-extras --dev

      - name: Build packages
        run: |
          rm -rf dist
          uv build --package swarm-shared --out-dir dist
          uv build --package hive-swarm --out-dir dist
          uv build --package ai-provider-swarm-gateway --out-dir dist
          uv run python scripts/generate_sbom.py --output dist/sbom.cyclonedx.json
          uv run python scripts/validate_sbom.py dist/sbom.cyclonedx.json
          uv run python scripts/generate_license_report.py --output dist/licenses.txt
          ls -lah dist

      - name: Smoke-test built wheels
        run: |
          python -m venv /tmp/wheel-smoke
          /tmp/wheel-smoke/bin/pip install --upgrade pip
          /tmp/wheel-smoke/bin/pip install dist/swarm_shared-*.whl dist/hive_swarm-*.whl dist/ai_provider_swarm_gateway-*.whl
          /tmp/wheel-smoke/bin/ai-provider-gateway --help
          /tmp/wheel-smoke/bin/swarmgraph --help
          /tmp/wheel-smoke/bin/ai-provider-gateway version
          /tmp/wheel-smoke/bin/ai-provider-gateway audit --help
          /tmp/wheel-smoke/bin/ai-provider-gateway mcp-toolbox --help

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
          if-no-files-found: error

  publish:
    needs: [build, test]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  release:
    needs: [build, test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Verify tag version matches package versions
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          for pkg in swarm-shared hive-swarm ai-provider-swarm-gateway; do
            pkg_ver=$(grep -E '^version' "packages/$pkg/pyproject.toml" | head -1 | cut -d'"' -f2)
            if [ "$pkg_ver" != "$VERSION" ]; then
              echo "::error::Tag $VERSION does not match $pkg version $pkg_ver"
              exit 1
            fi
          done

      - name: Extract changelog section
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES="$(
            awk -v version="$VERSION" '
              $0 == "## [" version "]" || index($0, "## [" version "] ") == 1 {
                found = 1
                next
              }
              found && /^## \[/ { exit }
              found { print }
            ' CHANGELOG.md
          )"
          if [ -z "$NOTES" ]; then
            echo "::error::No CHANGELOG.md section found for release version ${VERSION}"
            exit 1
          fi
          {
            echo "notes<<EOF"
            printf '%s\n' "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.notes }}
          files: dist/*
          fail_on_unmatched_files: true
