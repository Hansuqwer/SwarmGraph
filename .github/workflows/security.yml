name: Security

permissions:
  contents: read

on:
  schedule:
    - cron: "0 6 * * 1"  # Every Monday 06:00 UTC
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Secret scan (committed files)
        run: |
          base="${{ github.event.before }}"
          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ]; then
            base="HEAD~1"
          fi
          git diff "$base" HEAD -- '*.py' '*.md' '*.yaml' '*.yml' '*.json' '*.toml' \
            | grep -iE 'sk-[a-z0-9]{20}|AKIA[0-9A-Z]{16}|ghp_[a-zA-Z0-9]{36}|Bearer [a-zA-Z0-9]{20,}' \
            && echo "::error::Potential secret detected in diff" && exit 1 \
            || echo "Secret scan: clean"

  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run pip-audit
        run: uv run pip-audit --desc --skip-editable
        continue-on-error: true  # advisory until dependency baseline is triaged

  bandit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run bandit
        run: |
          uv run bandit \
            -r packages/swarm-shared/swarm_shared packages/hive-swarm/swarm packages/ai-provider-swarm-gateway/src \
            -f screen
        continue-on-error: true  # advisory until SAST baseline is triaged
