[tool.uv.workspace]
members = [
    "packages/swarm-shared",
    "packages/hive-swarm",
    "packages/ai-provider-swarm-gateway",
]

[tool.uv.sources]
swarm-shared = { workspace = true }
hive-swarm = { workspace = true }
ai-provider-swarm-gateway = { workspace = true }

[dependency-groups]
dev = [
    "pytest>=9.0.3,<10",
    "pytest-asyncio>=1.3,<2",
    "pytest-cov>=7.1,<8",
    "hypothesis>=6.110",
    "ruff>=0.6,<1",
    "bandit>=1.8,<2",
    "pip-audit>=2.8,<3",
    "pyright>=1.1.380",
    "mkdocs-material>=9.5",
    "mkdocstrings[python]>=0.26",
    "cyclonedx-python-lib[validation]>=11.7,<12",
]

[tool.pytest.ini_options]
testpaths = [
    "packages/swarm-shared/tests",
    "packages/hive-swarm/tests",
    "packages/ai-provider-swarm-gateway/tests",
]
addopts = "-q --tb=short --strict-markers --import-mode=importlib"
asyncio_mode = "auto"
filterwarnings = [
    "ignore::DeprecationWarning:langchain.*",
    "ignore::PendingDeprecationWarning:langchain.*",
    "ignore:.*allowed_objects.*",
]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E9", "F63", "F7", "F82", "B", "I", "UP", "S"]
ignore = [
    "B008",  # Typer uses Option()/Argument() defaults by design.
]

[tool.ruff.lint.per-file-ignores]
"**/tests/**" = ["S101", "S105", "S106", "S107"]
"examples/**" = ["S101"]
"packages/ai-provider-swarm-gateway/src/ai_provider_swarm_gateway/providers/grok_adapter.py" = ["S310"]
"packages/ai-provider-swarm-gateway/src/ai_provider_swarm_gateway/providers/nine_router_adapter.py" = ["S310"]
"packages/hive-swarm/swarm/llm/embeddings.py" = ["S310"]
"scripts/benchmark_swarm.py" = ["S603"]
"scripts/sync_github_labels.py" = ["S310"]

[tool.pyright]
pythonVersion = "3.11"
typeCheckingMode = "basic"
include = [
    "packages/swarm-shared/swarm_shared",
    "packages/hive-swarm/swarm",
    "packages/ai-provider-swarm-gateway/src",
]
reportMissingImports = false
reportMissingModuleSource = false
